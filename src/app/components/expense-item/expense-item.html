<div class="card">
  <div class="card-body container">
    <div class="row">
      <div class="col-md-6">
        <h3 class="card-title">{{ expense().title }}</h3>
      </div>
      <div class="col-md-6 text-end">
        <h5 class="card-text" [style.color]="expense().amount > 999.99 ? 'red' : 'green'">
          ${{ expense().amount }}
        </h5>
      </div>
    </div>
    <div class="row">
      <div class="col-md-6">
        <h6 class="card-text" [style.color]="getCategoryColor()">{{ expense().category }}</h6>
      </div>
      <div class="col-md-6 text-end">
        <button class="btn btn-primary btn-sm me-2" [routerLink]="['/edit', expense().id]">
          Edit
        </button>
        <button class="btn btn-danger btn-sm me-2" (click)="deleteExpense()">Delete</button>
      </div>
    </div>
  </div>
</div>
